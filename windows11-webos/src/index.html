<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webindows</title>

    <link rel="stylesheet" href="css/desktop.css">
</head>

<body>

<div id="desktop">

    <!-- デスクトップアイコン -->
    <div id="desktopIcons">

        <div class="desktopIcon" id="desktopNotepad">
            📝
            <span>メモ帳</span>
        </div>

        <div class="desktopIcon" id="desktopExplorer">
            📁
            <span>エクスプローラー</span>
        </div>

    </div>

    <!-- ウィンドウ表示エリア -->
    <div id="windows"></div>

    <!-- スタートメニュー -->
    <div id="startMenu">

        <h2>Webindows</h2>

        <button id="openNotepad">
            メモ帳
        </button>

    </div>

    <!-- タスクバー -->
    <div id="taskbar">

        <button id="startBtn">
            ⊞
        </button>

        <div id="clock"></div>

    </div>

</div>

<script src="js/core/desktop.js"></script>

</body>
</html>
